name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 is what the Dockerfile ships; 3.12 is what Codespaces gives you.
        # Test both so the two environments cannot silently drift apart.
        python-version: ["3.11", "3.12"]
    env:
      ENV: test
      EMBEDDING_BACKEND: hash
      CACHE_ENABLED: "false"
      # Quote this. Unquoted, the trailing colon of ":memory:" terminates the
      # plain scalar and YAML parses the line as a nested mapping.
      SQL_URL: "sqlite+aiosqlite:///:memory:"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check app tests

      - name: Test
        run: pytest --cov=app --cov-report=term-missing

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: rag-docs-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
