name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 is what the Dockerfile ships; 3.12 is what Codespaces gives you.
        # Test both so the two environments cannot silently drift apart.
        python-version: ["3.11", "3.12"]
    env:
      ENV: test
      EMBEDDING_BACKEND: hash
      CACHE_ENABLED: "false"
      # Quote this. Unquoted, the trailing colon of ":memory:" terminates the
      # plain scalar and YAML parses the line as a nested mapping.
      SQL_URL: "sqlite+aiosqlite:///:memory:"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check app tests

      - name: Test
        run: pytest --cov=app --cov-report=term-missing

  integration:
    name: integration (live Postgres/Mongo/Redis)
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: ragpass
          POSTGRES_DB: ragdocs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rag -d ragdocs"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ping:1})'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      ENV: test
      # Real ONNX embeddings here, not the hash stub the unit suite uses. This is
      # the only job that proves the model downloads and actually infers.
      EMBEDDING_BACKEND: onnx
      CACHE_ENABLED: "true"
      SQL_URL: "postgresql+asyncpg://rag:ragpass@localhost:5432/ragdocs"
      MONGO_URL: "mongodb://localhost:27017"
      REDIS_URL: "redis://localhost:6379/0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Cache the ONNX embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/chroma
          key: chroma-onnx-all-MiniLM-L6-v2

      - name: Integration tests
        run: pytest tests/integration -v

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: rag-docs-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
