[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
# Default run is unit-only: no Docker, no network, no services. Integration is
# opt-in via an explicit path (`pytest tests/integration`), so a missing database
# can never silently turn into a skipped-and-forgotten test.
testpaths = ["tests/unit"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4"]

[tool.ruff.lint.per-file-ignores]
# Depends()/Query()/File() in argument defaults is the documented FastAPI idiom.
"app/api/routes/*.py" = ["B008"]
